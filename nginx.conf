log_format proxy_format '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'to: $upstream_addr, status: $upstream_status, response_time: $upstream_response_time';

server {
  listen 80;
  server_name localhost;

  access_log /var/log/nginx/access.log proxy_format;
  error_log /var/log/nginx/error.log info;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass https://hale-lims-322945089195.asia-south1.run.app/api/;
    proxy_set_header Host hale-lims-322945089195.asia-south1.run.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Important: Don't pass authorization headers to the backend from nginx
    # Let the frontend handle auth headers
    proxy_pass_request_headers on;
  }
}
